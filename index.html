<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>けいひんこうかんアプリ</title>
  
  <!-- ★ ファビコン（タブのアイコン）とスマホ用アイコンの設定を追加 -->
  <link rel="icon" href="./名称未設定のデザイン.png" type="image/png">
  <link rel="apple-touch-icon" href="./名称未設定のデザイン.png">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- QRコードリーダー -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    /* スクロールバーを隠すためのCSS */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <!-- Firebaseを読み込んでグローバル変数にセットする -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.FirebaseDB = { 
      initializeApp, getFirestore, doc, getDoc, setDoc, onSnapshot, collection,
      addDoc, updateDoc, deleteDoc
    };
  </script>
</head>
<body class="bg-[#FFF9E6] text-gray-800 font-sans">
  <div id="root"></div>

  <!-- Reactアプリのコード -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- 先生モードのパスワード設定 ---
    const TEACHER_PASSWORD = "1987"; // ★ここを変更するとパスワードが変わります

    // ==========================================
    // 1. アイコン
    // ==========================================
    const IconStar = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
    const IconCart = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>;
    const IconHeart = ({className, filled}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>;
    const IconHistory = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const IconLogOut = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;
    const IconArrowLeft = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
    const IconCheck = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconTrash = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const IconQrCode = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><path d="M3 14h7v7H3z"></path><path d="M12 7v2"></path><path d="M12 15v2"></path><path d="M15 12h2"></path><path d="M7 12h2"></path></svg>;
    const IconSettings = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
    const IconPlus = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconEdit = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;

    // ==========================================
    // 2. データ定義（カテゴリーと初期景品）
    // ==========================================
    const CATEGORIES = [
      { id: 'all', name: 'すべて', color: 'bg-gray-200 text-gray-700' },
      { id: 'favorite', name: '❤️ おきにいり', color: 'bg-red-100 text-red-600' },
      { id: 'snack', name: 'おかし', color: 'bg-pink-100 text-pink-700' },
      { id: 'stationery', name: 'ぶんぼうぐ', color: 'bg-blue-100 text-blue-700' },
      { id: 'toy', name: 'おもちゃ・ざっか', color: 'bg-green-100 text-green-700' },
      { id: 'book', name: 'ほん・せいしょ', color: 'bg-purple-100 text-purple-700' },
      { id: 'sticker', name: 'シール・カード', color: 'bg-orange-100 text-orange-700' },
    ];

    const INITIAL_PRIZES = [
      { name: 'うまいぼう', category: 'snack', points: 100, image: 'https://placehold.co/400x300/FCE7F3/BE185D?text=おかし' },
      { name: 'きらきらえんぴつ', category: 'stationery', points: 100, image: 'https://placehold.co/400x300/DBEAFE/1D4ED8?text=ぶんぼうぐ' },
      { name: 'ぷくぷくシール', category: 'sticker', points: 100, image: 'https://placehold.co/400x300/FEF3C7/B45309?text=シール' },
      { name: 'スーパーボール', category: 'toy', points: 100, image: 'https://placehold.co/400x300/D1FAE5/047857?text=おもちゃ' },
    ];

    // ==========================================
    // 3. QRコードリーダー コンポーネント
    // ==========================================
    const QrReader = ({ onScan, onCancel }) => {
      useEffect(() => {
        const html5QrCode = new Html5Qrcode("qr-reader-box");
        html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          (decodedText) => { html5QrCode.stop().then(() => onScan(decodedText)); },
          (error) => {}
        ).catch(err => {
          alert("カメラを起動できませんでした。ブラウザの権限を確認してください。");
        });
        return () => { if (html5QrCode.isScanning) html5QrCode.stop().catch(e => console.error(e)); };
      }, []);
      return (
        <div className="fixed inset-0 bg-black bg-opacity-80 flex flex-col items-center justify-center z-50 p-4">
          <div className="bg-white p-4 rounded-3xl w-full max-w-sm mb-4">
            <h3 className="text-center font-bold mb-2">QRコードをうつしてね</h3>
            <div id="qr-reader-box" className="w-full rounded-xl overflow-hidden bg-black"></div>
          </div>
          <button onClick={onCancel} className="px-8 py-4 bg-red-500 text-white rounded-full font-bold shadow-lg">やめる</button>
        </div>
      );
    };

    // ==========================================
    // 4. メインアプリ
    // ==========================================
    const App = ({ firebaseHelpers }) => {
      const { initializeApp, getFirestore, doc, getDoc, setDoc, onSnapshot, collection, addDoc, updateDoc, deleteDoc } = firebaseHelpers;

      // ★ 修正点: 出席簿アプリと全く同じFirebase設定を直接使用します
      const firebaseConfig = {
          apiKey: "AIzaSyB4IEE2O2ASi2ONyEPqvHJVa48rzN3Y6X0",
          authDomain: "hkpointapp.firebaseapp.com",
          projectId: "hkpointapp",
          storageBucket: "hkpointapp.firebasestorage.app",
          messagingSenderId: "696908221772",
          appId: "1:696908221772:web:0ad30910bd6c7493bbd3e9"
      };

      const [firebaseApp] = useState(() => initializeApp(firebaseConfig));
      const [db] = useState(() => getFirestore(firebaseApp));

      // ★ 修正点: 出席簿アプリと同じ「students」コレクションを見に行くように設定！
      const getMemberRef = (memberId) => doc(db, 'students', String(memberId));
      const prizesColRef = collection(db, 'prizes');
      const ordersColRef = collection(db, 'orders');

      // ---- ステート管理 ----
      const [currentMemberId, setCurrentMemberId] = useState(null);
      const [currentUser, setCurrentUser] = useState(null); 
      
      const [activeView, setActiveView] = useState('login'); // login, home, cart, history, teacherDashboard, teacherOrders, teacherEdit
      const [isScanning, setIsScanning] = useState(false);
      const [inputMemberId, setInputMemberId] = useState('');

      const [prizes, setPrizes] = useState([]); 
      const [orders, setOrders] = useState([]); 
      const [cart, setCart] = useState([]);
      const [favorites, setFavorites] = useState([]);
      
      const [activeCategory, setActiveCategory] = useState('all');
      const [maxPoint, setMaxPoint] = useState(3000);
      const [toastMsg, setToastMsg] = useState('');

      // 先生モード用ステート
      const [editingPrize, setEditingPrize] = useState(null);
      const [imageInputMode, setImageInputMode] = useState('url');

      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 2000); };

      // ---- リアルタイム同期 ----
      useEffect(() => {
        const unsubscribe = onSnapshot(prizesColRef, (snapshot) => {
          const loadedPrizes = [];
          snapshot.forEach((doc) => {
            loadedPrizes.push({ ...doc.data(), id: doc.id });
          });
          loadedPrizes.sort((a, b) => a.points - b.points);
          setPrizes(loadedPrizes);
        }, (err) => console.error(err));
        return () => unsubscribe();
      }, [db]);

      useEffect(() => {
        const unsubscribe = onSnapshot(ordersColRef, (snapshot) => {
          const loadedOrders = [];
          snapshot.forEach((doc) => {
            loadedOrders.push({ ...doc.data(), id: doc.id });
          });
          loadedOrders.sort((a, b) => b.timestamp - a.timestamp);
          setOrders(loadedOrders);
        }, (err) => console.error(err));
        return () => unsubscribe();
      }, [db]);

      useEffect(() => {
        if (!currentMemberId) return;
        const memberRef = getMemberRef(currentMemberId);
        const unsubscribe = onSnapshot(memberRef, (snap) => {
          if (snap.exists()) setCurrentUser({ id: currentMemberId, ...snap.data() });
          else { setCurrentUser(null); setCurrentMemberId(null); setActiveView('login'); }
        }, (err) => console.error(err));
        return () => unsubscribe();
      }, [currentMemberId, db]);


      // ---- ユーザー向けアクション ----
      const handleLoginSubmit = async (memberId) => {
        if (!memberId) return;

        if (memberId === TEACHER_PASSWORD) {
          setActiveView('teacherDashboard');
          showToast('先生モードに入りました');
          return;
        }

        try {
          const snap = await getDoc(getMemberRef(memberId));
          if (snap.exists()) {
            setCurrentMemberId(memberId);
            setActiveView('home');
            setCart([]);
            showToast('ログインしたよ！');
          } else {
            alert(`かいいんID「${memberId}」は みつからなかったよ。`);
          }
        } catch (error) {
          console.error(error); alert('エラーがおきました。ネットワークを確認してください。');
        }
      };

      const handleTestUserCreation = async () => {
        const testId = "001";
        try {
          // ★ 出席簿アプリに合わせてポイントは「pointBalance」に保存します
          await setDoc(getMemberRef(testId), { name: "テスト たろう", pointBalance: 2000, history: [] }, { merge: true });
          handleLoginSubmit(testId);
        } catch (error) { console.error(error); alert('テストデータの作成に失敗しました。'); }
      };

      const handleLogout = () => { setCurrentMemberId(null); setCurrentUser(null); setActiveView('login'); };

      const addToCart = (prize) => {
        setCart([...cart, { ...prize, cartItemId: Date.now() + Math.random() }]);
        showToast(`${prize.name} をカートにいれたよ！`);
      };

      const removeFromCart = (cartItemId) => setCart(cart.filter(item => item.cartItemId !== cartItemId));
      const cartTotalPoints = useMemo(() => cart.reduce((total, item) => total + item.points, 0), [cart]);

      const handleCheckout = async () => {
        // ★ 出席簿アプリの「pointBalance」を参照して計算します
        if (!currentUser || cartTotalPoints > (currentUser.pointBalance || 0)) return;
        const newPoints = (currentUser.pointBalance || 0) - cartTotalPoints;
        
        const timestamp = Date.now();
        const dateStr = new Date().toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute:'2-digit' });
        
        const newHistoryItem = {
          id: timestamp,
          date: dateStr,
          items: cart.map(i => ({ name: i.name, image: i.image })),
          totalPoints: cartTotalPoints
        };

        const newOrderItem = {
          memberId: currentUser.id,
          memberName: currentUser.name || 'なまえ未登録',
          date: dateStr,
          timestamp: timestamp,
          items: cart.map(i => ({ name: i.name, image: i.image })),
          totalPoints: cartTotalPoints
        };

        try {
          // ★ 出席簿アプリに合わせたフィールド「pointBalance」を更新します
          await setDoc(getMemberRef(currentUser.id), { pointBalance: newPoints, history: [newHistoryItem, ...(currentUser.history || [])] }, { merge: true });
          await addDoc(ordersColRef, newOrderItem);
          
          setCart([]); showToast('もうしこみが かんりょうしたよ！'); setActiveView('history');
        } catch (error) { console.error(error); alert('もうしこみに しっぱいしました。'); }
      };

      const filteredPrizes = useMemo(() => {
        let filtered = prizes;
        if (activeCategory === 'favorite') filtered = filtered.filter(p => favorites.includes(p.id));
        else if (activeCategory !== 'all') filtered = filtered.filter(p => p.category === activeCategory);
        filtered = filtered.filter(p => p.points <= maxPoint);
        return filtered;
      }, [activeCategory, maxPoint, favorites, prizes]);

      // ---- 先生モード向けアクション ----
      const handleInitPrizes = async () => {
        if(!confirm('初期の景品データを追加しますか？')) return;
        try {
          for (const prize of INITIAL_PRIZES) {
            await addDoc(prizesColRef, prize);
          }
          showToast('初期データを追加しました');
        } catch (error) {
          console.error(error); alert('エラーが発生しました');
        }
      };

      const processImageFile = (file) => {
        return new Promise((resolve, reject) => {
          if (!file.type.match('image.*')) {
            reject('画像ファイルを選択してください'); return;
          }
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_SIZE = 600; 
              let width = img.width; let height = img.height;
              if (width > height) {
                if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
              } else {
                if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
              }
              canvas.width = width; canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
      };

      const handleImageFileChange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const base64Image = await processImageFile(file);
          setEditingPrize({ ...editingPrize, image: base64Image });
        } catch (error) {
          alert(error);
        }
      };

      const savePrize = async (e) => {
        e.preventDefault();
        if (!editingPrize.name || !editingPrize.image) {
          alert('名前と画像は必須です'); return;
        }
        const prizeData = {
          name: editingPrize.name,
          category: editingPrize.category,
          points: Number(editingPrize.points),
          image: editingPrize.image
        };

        try {
          if (editingPrize.id) {
            const prizeRef = doc(prizesColRef, String(editingPrize.id));
            await updateDoc(prizeRef, prizeData);
            showToast('景品を更新しました');
          } else {
            await addDoc(prizesColRef, prizeData);
            showToast('景品を追加しました');
          }
          setActiveView('teacherDashboard');
        } catch (error) {
          console.error(error); alert('保存に失敗しました');
        }
      };

      const deletePrize = async (prizeId, name) => {
        if (!prizeId) return;
        if (!confirm(`「${name}」を本当に削除しますか？`)) return;
        try {
          const prizeRef = doc(prizesColRef, String(prizeId));
          await deleteDoc(prizeRef);
          showToast('削除しました');
        } catch (error) {
          console.error("Delete Prize Error:", error); alert('削除に失敗しました');
        }
      };

      const deleteOrder = async (orderId, memberId, timestamp, memberName) => {
        if (!orderId) {
           alert('エラー：注文のIDがみつかりません。');
           return;
        }
        if (!confirm(`「${memberName}」さんに景品を渡しましたか？\n（「OK」を押すと、先生のリストと子供の履歴の【両方から】完全に消去されます）`)) return;
        
        // データベースの処理を待たずに即座に消す
        setOrders(prevOrders => prevOrders.filter(order => order.id !== orderId));

        try {
          const orderRef = doc(ordersColRef, String(orderId));
          await deleteDoc(orderRef);

          if (memberId && timestamp) {
            const memberRef = getMemberRef(memberId);
            const memberSnap = await getDoc(memberRef);
            if (memberSnap.exists()) {
               const memberData = memberSnap.data();
               if (memberData.history) {
                   const updatedHistory = memberData.history.filter(item => item.id !== timestamp);
                   await updateDoc(memberRef, { history: updatedHistory });
               }
            }
          }

          showToast('渡し済みとして 完全に削除しました');
        } catch (error) {
          console.error("Delete Order Error:", error); alert('エラーが発生しました。通信環境などを確認してください。');
        }
      };

      const openEditForm = (prize = null) => {
        if (prize) {
          setEditingPrize({ ...prize });
          setImageInputMode(prize.image.startsWith('data:image') ? 'file' : 'url');
        } else {
          setEditingPrize({ name: '', category: 'snack', points: 100, image: '' });
          setImageInputMode('url');
        }
        setActiveView('teacherEdit');
      };

      // ==========================================
      // ビューの描画
      // ==========================================

      const TeacherHeader = () => (
        <div className="bg-gray-800 text-white pt-4 px-4 sticky top-0 z-50 shadow-md">
          <div className="flex justify-between items-center mb-4 max-w-4xl mx-auto">
            <div className="flex items-center gap-2">
              <IconSettings className="w-5 h-5" />
              <span className="font-bold">先生モード</span>
            </div>
            <button onClick={() => { setActiveView('login'); setInputMemberId(''); }} className="text-sm bg-gray-700 px-3 py-1 rounded hover:bg-gray-600">終了</button>
          </div>
          <div className="flex gap-2 max-w-4xl mx-auto">
            <button onClick={() => setActiveView('teacherDashboard')} className={`flex-1 py-3 font-bold rounded-t-xl transition-colors ${activeView === 'teacherDashboard' ? 'bg-gray-50 text-gray-800' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>景品管理</button>
            <button onClick={() => setActiveView('teacherOrders')} className={`flex-1 py-3 font-bold rounded-t-xl transition-colors ${activeView === 'teacherOrders' ? 'bg-gray-50 text-gray-800' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>みんなの注文履歴</button>
          </div>
        </div>
      );

      // --- 通常ログイン画面 ---
      if (activeView === 'login') {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 relative">
            <div className="bg-white rounded-3xl shadow-xl p-5 sm:p-8 max-w-md w-full border-4 border-orange-200 z-10">
              <div className="text-center mb-6 sm:mb-8">
                {/* ★ 元の星アイコンに戻しました */}
                <div className="bg-orange-100 w-20 h-20 sm:w-24 sm:h-24 rounded-full flex items-center justify-center mx-auto mb-4">
                  <IconStar className="text-orange-500 w-10 h-10 sm:w-12 sm:h-12" />
                </div>
                <h1 className="text-xl sm:text-2xl font-bold text-gray-800">けいひんをえらぼう！</h1>
              </div>
              
              <div className="space-y-5 sm:space-y-6">
                <div>
                  <label className="block text-gray-600 font-bold mb-2 text-xs sm:text-sm">かいいんIDを にゅうりょく</label>
                  <div className="flex gap-2">
                    {/* ★ min-w-0 を追加してスマホ画面でしっかり縮むように修正 */}
                    <input type="text" value={inputMemberId} onChange={(e) => setInputMemberId(e.target.value)} placeholder="例: 12345" className="flex-1 min-w-0 bg-gray-50 border-2 border-gray-200 rounded-xl px-3 sm:px-4 py-3 font-bold text-base sm:text-lg focus:border-orange-400 focus:outline-none" />
                    {/* ★ shrink-0 を追加してボタンが潰れないように修正 */}
                    <button onClick={() => handleLoginSubmit(inputMemberId)} className="shrink-0 bg-orange-500 text-white px-5 sm:px-6 rounded-xl font-bold hover:bg-orange-600 active:scale-95 transition-transform">OK</button>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <div className="h-px bg-gray-200 flex-1"></div><span className="text-gray-400 font-bold text-sm">または</span><div className="h-px bg-gray-200 flex-1"></div>
                </div>
                <button onClick={() => setIsScanning(true)} className="w-full py-3 sm:py-4 bg-blue-500 text-white font-bold text-base sm:text-lg rounded-2xl flex items-center justify-center gap-3 shadow-[0_4px_0_#1d4ed8] active:shadow-[0_0px_0_#1d4ed8] active:translate-y-1 transition-all">
                  <IconQrCode className="w-6 h-6" />QRコードで ログイン
                </button>
              </div>

              <div className="mt-8 sm:mt-12 pt-6 border-t border-gray-100 text-center">
                <p className="text-xs text-gray-400 mb-2">※はじめてであそんでみたい人向け</p>
                <button onClick={handleTestUserCreation} className="text-xs sm:text-sm font-bold text-orange-500 bg-orange-50 px-4 py-2 rounded-full">テスト用データを作ってあそぶ</button>
              </div>
            </div>

            {isScanning && <QrReader onScan={(text) => { setIsScanning(false); handleLoginSubmit(text); }} onCancel={() => setIsScanning(false)} />}
          </div>
        );
      }

      if (activeView === 'teacherDashboard') {
        return (
          <div className="min-h-screen bg-gray-50 pb-24">
            <TeacherHeader />
            <main className="max-w-4xl mx-auto p-4 pt-6">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-xl font-bold text-gray-800">登録されている景品 ({prizes.length}件)</h2>
                <button onClick={() => openEditForm(null)} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-blue-700 shadow-sm transition-all active:scale-95">
                  <IconPlus className="w-5 h-5" /> 新しい景品を追加
                </button>
              </div>

              {prizes.length === 0 ? (
                <div className="bg-white p-12 rounded-2xl border-2 border-dashed border-gray-300 text-center">
                  <p className="text-gray-500 mb-4">景品がまだ登録されていません。</p>
                  <button onClick={handleInitPrizes} className="text-blue-600 font-bold underline hover:text-blue-800">
                    サンプルの景品データを一括登録する
                  </button>
                </div>
              ) : (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                  <table className="w-full text-left">
                    <thead className="bg-gray-100 text-gray-600 text-sm">
                      <tr>
                        <th className="p-3 w-16">写真</th>
                        <th className="p-3">名前</th>
                        <th className="p-3 w-24">ポイント</th>
                        <th className="p-3 w-28">カテゴリ</th>
                        <th className="p-3 w-24 text-center">操作</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {prizes.map(prize => {
                        const catName = CATEGORIES.find(c => c.id === prize.category)?.name.replace('❤️ ', '') || prize.category;
                        return (
                          <tr key={prize.id} className="hover:bg-gray-50">
                            <td className="p-3"><img src={prize.image} alt={prize.name} className="w-12 h-12 object-cover rounded bg-gray-200" /></td>
                            <td className="p-3 font-bold text-gray-800">{prize.name}</td>
                            <td className="p-3 text-orange-600 font-bold">{prize.points} pt</td>
                            <td className="p-3 text-sm text-gray-500">{catName}</td>
                            <td className="p-3 text-center">
                              <div className="flex justify-center gap-2">
                                <button onClick={() => openEditForm(prize)} className="p-2 text-blue-500 hover:bg-blue-50 rounded" title="編集"><IconEdit className="w-5 h-5" /></button>
                                <button onClick={() => deletePrize(prize.id, prize.name)} className="p-2 text-red-500 hover:bg-red-50 rounded" title="削除"><IconTrash className="w-5 h-5" /></button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </main>
            {toastMsg && <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-xl font-bold text-sm z-50">{toastMsg}</div>}
          </div>
        );
      }

      if (activeView === 'teacherOrders') {
        return (
          <div className="min-h-screen bg-gray-50 pb-24">
            <TeacherHeader />
            <main className="max-w-4xl mx-auto p-4 pt-6">
              <h2 className="text-xl font-bold text-gray-800 mb-6">みんなの注文履歴 ({orders.length}件)</h2>
              
              {orders.length === 0 ? (
                <div className="bg-white p-12 rounded-2xl border-2 border-dashed border-gray-300 text-center">
                  <p className="text-gray-500 mb-4">まだ注文はありません。</p>
                </div>
              ) : (
                <div className="space-y-4">
                  {orders.map(order => (
                    <div key={order.id} className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                      <div className="bg-blue-50 px-4 py-3 flex justify-between items-center border-b border-blue-100">
                        <div>
                          <span className="font-bold text-blue-900 text-lg mr-2">{order.memberName}</span>
                          <span className="text-sm text-blue-700 font-bold">(ID: {order.memberId})</span>
                        </div>
                        <div className="text-right">
                          <div className="text-sm text-blue-600 font-bold">{order.date}</div>
                          <div className="text-pink-600 font-bold mt-1">-{order.totalPoints} pt</div>
                        </div>
                      </div>
                      <div className="p-4">
                        <div className="flex gap-4 overflow-x-auto mb-4">
                          {order.items.map((item, idx) => (
                            <div key={idx} className="flex flex-col items-center flex-shrink-0 w-20 text-center">
                              <img src={item.image} alt={item.name} className="w-16 h-16 object-cover rounded-xl mb-1 bg-gray-100 border border-gray-200" />
                              <span className="text-xs font-bold text-gray-700">{item.name}</span>
                            </div>
                          ))}
                        </div>
                        <div className="border-t border-gray-100 pt-4 flex justify-end">
                          <button 
                            onClick={() => deleteOrder(order.id, order.memberId, order.timestamp, order.memberName)}
                            className="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 shadow-sm active:translate-y-1 transition-all"
                          >
                            <IconCheck className="w-5 h-5" /> 景品渡し済み（リストから消す）
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </main>
            {toastMsg && <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-xl font-bold text-sm z-50">{toastMsg}</div>}
          </div>
        );
      }

      if (activeView === 'teacherEdit') {
        const isNew = !editingPrize.id;
        return (
          <div className="min-h-screen bg-gray-50 pb-24">
            <div className="bg-gray-800 text-white p-4 sticky top-0 z-50 shadow-md flex items-center gap-3">
              <button onClick={() => setActiveView('teacherDashboard')} className="p-1 hover:bg-gray-700 rounded"><IconArrowLeft className="w-6 h-6" /></button>
              <span className="font-bold">{isNew ? '新しい景品を追加' : '景品の情報を編集'}</span>
            </div>

            <main className="max-w-2xl mx-auto p-4 pt-6">
              <form onSubmit={savePrize} className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-6">
                
                <div>
                  <label className="block text-gray-700 font-bold mb-2">景品の写真</label>
                  <div className="flex gap-4 mb-3 p-3 bg-gray-50 rounded-xl border border-gray-200">
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input type="radio" name="imageMode" value="url" checked={imageInputMode === 'url'} onChange={(e) => setImageInputMode(e.target.value)} className="accent-blue-600" />
                      <span className="text-sm font-bold text-gray-700">URLを貼り付け</span>
                    </label>
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input type="radio" name="imageMode" value="file" checked={imageInputMode === 'file'} onChange={(e) => setImageInputMode(e.target.value)} className="accent-blue-600" />
                      <span className="text-sm font-bold text-gray-700">スマホ/PCからアップロード</span>
                    </label>
                  </div>

                  {imageInputMode === 'url' ? (
                    <input type="text" value={editingPrize.image} onChange={(e) => setEditingPrize({...editingPrize, image: e.target.value})} placeholder="https://..." className="w-full bg-white border border-gray-300 rounded-lg px-4 py-2 focus:border-blue-500 focus:outline-none" required />
                  ) : (
                    <input type="file" accept="image/jpeg, image/png" onChange={handleImageFileChange} className="w-full bg-white border border-gray-300 rounded-lg px-4 py-2 text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
                  )}

                  {editingPrize.image && (
                    <div className="mt-4 flex flex-col items-start">
                      <span className="text-xs text-gray-500 mb-1">プレビュー</span>
                      <img src={editingPrize.image} alt="プレビュー" className="w-32 h-32 object-cover rounded-xl border-2 border-gray-200 bg-gray-50" />
                    </div>
                  )}
                </div>

                <div>
                  <label className="block text-gray-700 font-bold mb-2">景品の名前</label>
                  <input type="text" value={editingPrize.name} onChange={(e) => setEditingPrize({...editingPrize, name: e.target.value})} placeholder="例: じゆうがちょう" className="w-full bg-white border border-gray-300 rounded-lg px-4 py-3 font-bold focus:border-blue-500 focus:outline-none" required />
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-gray-700 font-bold mb-2">必要ポイント</label>
                    <div className="relative">
                      <input type="number" min="10" step="10" value={editingPrize.points} onChange={(e) => setEditingPrize({...editingPrize, points: e.target.value})} className="w-full bg-white border border-gray-300 rounded-lg px-4 py-3 font-bold text-orange-600 focus:border-blue-500 focus:outline-none" required />
                      <span className="absolute right-4 top-3 text-gray-400 font-bold">pt</span>
                    </div>
                  </div>
                  <div>
                    <label className="block text-gray-700 font-bold mb-2">カテゴリー</label>
                    <select value={editingPrize.category} onChange={(e) => setEditingPrize({...editingPrize, category: e.target.value})} className="w-full bg-white border border-gray-300 rounded-lg px-4 py-3 font-bold focus:border-blue-500 focus:outline-none">
                      {CATEGORIES.filter(c => c.id !== 'all' && c.id !== 'favorite').map(c => (
                        <option key={c.id} value={c.id}>{c.name}</option>
                      ))}
                    </select>
                  </div>
                </div>

                <div className="pt-6 border-t border-gray-100 flex gap-4">
                  <button type="button" onClick={() => setActiveView('teacherDashboard')} className="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200">キャンセル</button>
                  <button type="submit" className="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-md">
                    {isNew ? '追加する' : '保存する'}
                  </button>
                </div>
              </form>
            </main>
          </div>
        );
      }


      // --- 共通ヘッダー（ユーザー用） ---
      const Header = () => (
        <div className="bg-orange-400 text-white p-4 sticky top-0 z-50 shadow-md">
          <div className="max-w-4xl mx-auto flex justify-between items-center">
            <div className="flex items-center gap-3">
              {activeView !== 'home' ? (
                <button onClick={() => setActiveView('home')} className="p-2 bg-orange-500 rounded-full hover:bg-orange-600 active:scale-95 transition-transform"><IconArrowLeft className="w-6 h-6" /></button>
              ) : (
                <button onClick={handleLogout} className="p-2 bg-orange-500 rounded-full hover:bg-orange-600 active:scale-95 transition-transform"><IconLogOut className="w-6 h-6" /></button>
              )}
              {currentUser && (
                <div>
                  <div className="text-sm font-medium opacity-90">{currentUser.name || 'なまえ未登録'}</div>
                  {/* ★ 出席簿アプリに合わせて、表示する変数を「pointBalance」に修正 */}
                  <div className="text-xl font-bold flex items-center gap-1"><IconStar className="w-5 h-5 text-yellow-300" />{currentUser.pointBalance || 0} <span className="text-sm font-normal">pt</span></div>
                </div>
              )}
            </div>
            <div className="flex items-center gap-2">
              <button onClick={() => setActiveView('history')} className={`p-3 rounded-full flex items-center transition-transform active:scale-95 ${activeView === 'history' ? 'bg-orange-600' : 'bg-orange-500'}`}><IconHistory className="w-6 h-6" /></button>
              <button onClick={() => setActiveView('cart')} className={`relative p-3 rounded-full flex items-center transition-transform active:scale-95 ${activeView === 'cart' ? 'bg-orange-600' : 'bg-orange-500'}`}>
                <IconCart className="w-6 h-6" />
                {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-pink-500 text-white text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full border-2 border-orange-400">{cart.length}</span>}
              </button>
            </div>
          </div>
        </div>
      );

      // --- ログイン後 メイン画面（ユーザー用） ---
      return (
        <div className="pb-24">
          <Header />
          <main className="max-w-4xl mx-auto p-4 pt-6">
            
            {activeView === 'home' && (
              <div className="animate-fade-in">
                <div className="bg-white rounded-2xl p-4 shadow-sm mb-6 border-2 border-orange-100">
                  <h2 className="text-lg font-bold text-gray-700 mb-3 flex items-center gap-2">
                    <IconStar className="w-5 h-5 text-orange-400" />どんな けいひんを さがす？
                  </h2>
                  <div className="flex overflow-x-auto pb-2 gap-2 snap-x hide-scrollbar">
                    {CATEGORIES.map(cat => (
                      <button key={cat.id} onClick={() => setActiveCategory(cat.id)} className={`snap-start whitespace-nowrap px-4 py-2 rounded-full font-bold text-sm transition-all border-b-4 active:border-b-0 active:translate-y-1 ${activeCategory === cat.id ? 'bg-orange-400 text-white border-orange-500' : `${cat.color} border-opacity-30 border-black`}`}>
                        {cat.name}
                      </button>
                    ))}
                  </div>
                  <div className="mt-4 pt-4 border-t border-gray-100">
                    <div className="flex justify-between items-center mb-2">
                      <span className="font-bold text-gray-600 text-sm">ポイントでしぼる</span>
                      <span className="font-bold text-orange-500 bg-orange-100 px-3 py-1 rounded-full text-sm">{maxPoint} pt まで</span>
                    </div>
                    <input type="range" min="100" max="3000" step="100" value={maxPoint} onChange={(e) => setMaxPoint(Number(e.target.value))} className="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-orange-500" />
                  </div>
                </div>

                {filteredPrizes.length === 0 ? (
                  <div className="text-center py-12 text-gray-400 font-bold bg-white rounded-2xl border-2 border-dashed border-gray-200">
                    <p>あてはまる けいひんが ないみたい...</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    {filteredPrizes.map(prize => {
                      const isFav = favorites.includes(prize.id);
                      return (
                        <div key={prize.id} className="bg-white rounded-2xl shadow-sm border-2 border-orange-50 overflow-hidden flex flex-col">
                          <div className="relative aspect-[4/3] bg-gray-100">
                            <img src={prize.image} alt={prize.name} className="w-full h-full object-cover" />
                            <button onClick={() => setFavorites(isFav ? favorites.filter(id => id !== prize.id) : [...favorites, prize.id])} className="absolute top-2 right-2 p-2 bg-white/80 rounded-full shadow-sm">
                              <IconHeart className={`w-5 h-5 ${isFav ? 'text-pink-500' : 'text-gray-400'}`} filled={isFav} />
                            </button>
                          </div>
                          <div className="p-3 flex-1 flex flex-col">
                            <h3 className="font-bold text-gray-800 mb-1 flex-1">{prize.name}</h3>
                            <div className="font-bold text-orange-500 mb-3">{prize.points} pt</div>
                            <button onClick={() => addToCart(prize)} className="w-full py-2 bg-[#48C0CB] text-white rounded-xl font-bold shadow-[0_4px_0_#2b8a92] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-2">
                              <IconCart className="w-4 h-4" /> カートへ
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {activeView === 'cart' && (
              <div className="animate-fade-in max-w-2xl mx-auto">
                <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2"><IconCart className="w-6 h-6 text-orange-500" />カートの なかみ</h2>
                {cart.length === 0 ? (
                  <div className="bg-white p-8 rounded-3xl text-center shadow-sm border-2 border-dashed border-gray-200">
                    <p className="text-gray-500 font-bold">カートは からっぽ だよ。</p>
                  </div>
                ) : (
                  <>
                    <div className="bg-white rounded-2xl shadow-sm p-4 mb-6 space-y-4">
                      {cart.map((item) => (
                        <div key={item.cartItemId} className="flex items-center gap-4 pb-4 border-b border-gray-100 last:border-0 last:pb-0">
                          <img src={item.image} alt={item.name} className="w-16 h-16 rounded-xl object-cover" />
                          <div className="flex-1 font-bold">{item.name}<div className="text-orange-500">{item.points} pt</div></div>
                          <button onClick={() => removeFromCart(item.cartItemId)} className="p-2 text-red-400"><IconTrash className="w-6 h-6" /></button>
                        </div>
                      ))}
                    </div>
                    <div className="bg-white rounded-3xl p-6 shadow-sm border-4 border-orange-100 font-bold">
                      <div className="flex justify-between mb-2 text-gray-600"><span>いまのポイント:</span><span>{currentUser.pointBalance || 0} pt</span></div>
                      <div className="flex justify-between mb-4 text-gray-800"><span>ぜんぶで:</span><span className="text-pink-500">- {cartTotalPoints} pt</span></div>
                      <div className="border-t-2 border-dashed border-gray-200 my-4"></div>
                      <div className={`flex justify-between mb-6 text-2xl ${(currentUser.pointBalance || 0) < cartTotalPoints ? 'text-red-500' : 'text-blue-500'}`}>
                        <span>のこり:</span><span>{(currentUser.pointBalance || 0) - cartTotalPoints} pt</span>
                      </div>
                      {(currentUser.pointBalance || 0) < cartTotalPoints ? (
                        <div className="bg-red-100 text-red-600 p-4 rounded-xl text-center">ポイントが たりないよ！</div>
                      ) : (
                        <button onClick={handleCheckout} className="w-full py-4 bg-[#FF85A2] text-white text-xl rounded-2xl shadow-[0_6px_0_#be185d] active:translate-y-1.5 active:shadow-none flex justify-center gap-2">
                          <IconCheck className="w-6 h-6" />これにする！（もうしこむ）
                        </button>
                      )}
                    </div>
                  </>
                )}
              </div>
            )}

            {activeView === 'history' && (
              <div className="animate-fade-in max-w-2xl mx-auto">
                <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2"><IconHistory className="w-6 h-6 text-orange-500" />もらったもの</h2>
                {(!currentUser?.history || currentUser.history.length === 0) ? (
                  <div className="bg-white p-8 rounded-3xl text-center shadow-sm border-2 border-dashed border-gray-200">
                    <p className="text-gray-500 font-bold">まだ なにも もらっていないよ。</p>
                  </div>
                ) : (
                  <div className="space-y-6">
                    {currentUser.history.map((record) => (
                      <div key={record.id} className="bg-white rounded-2xl shadow-sm border-2 border-orange-100 overflow-hidden">
                        <div className="bg-orange-50 px-4 py-3 flex justify-between font-bold border-b border-orange-100">
                          <span className="text-orange-800">{record.date}</span>
                          <span className="text-orange-500 bg-white px-3 py-1 rounded-full shadow-sm">つかった: {record.totalPoints} pt</span>
                        </div>
                        <div className="p-4 flex gap-4 overflow-x-auto">
                          {record.items.map((item, idx) => (
                            <div key={idx} className="flex flex-col items-center flex-shrink-0 w-20 text-center">
                              <img src={item.image} alt={item.name} className="w-16 h-16 object-cover rounded-xl mb-1 bg-gray-100" />
                              <span className="text-xs font-bold text-gray-700">{item.name}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </main>
          
          {toastMsg && (
            <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-xl font-bold text-sm z-50 animate-bounce">
              {toastMsg}
            </div>
          )}
        </div>
      );
    };

    const startApp = setInterval(() => {
      if (window.FirebaseDB) {
        clearInterval(startApp);
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App firebaseHelpers={window.FirebaseDB} />);
      }
    }, 50);

  </script>
</body>
</html>
